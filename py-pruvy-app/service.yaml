apiVersion: v1
kind: Service

metadata:
  name: py-pruvy-app
  namespace: py-pruvy-app
  labels:
    app: py-pruvy-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

spec:
  selector:
    app: py-pruvy-app

  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8000

  type: LoadBalancer
