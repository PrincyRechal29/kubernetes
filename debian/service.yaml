apiVersion: v1
kind: Service

metadata:
  name: debian-webapp
  namespace: debian-webapp
  labels:
    app: debian-webapp
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

spec:
  selector:
    app: debian-webapp

  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80

  type: LoadBalancer