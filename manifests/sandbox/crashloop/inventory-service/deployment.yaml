apiVersion: apps/v1
kind: Deployment

metadata:
  name: inventory-service
  namespace: sandbox
  labels:
    app: inventory-service
    version: v2.0.5
    team: supply-chain

spec:
  replicas: 2

  selector:
    matchLabels:
      app: inventory-service

  template:
    metadata:
      labels:
        app: inventory-service
        version: v2.0.5

    spec:
      containers:
      - name: inventory-service
        image: busybox:1.36

        command:
        - sh
        - -c
        - |
          echo "[inventory-service] starting..."
          echo "[inventory-service] connecting to postgres-primary.sandbox.svc.cluster.local:5432"
          sleep 2
          nc -zw3 postgres-primary.sandbox.svc.cluster.local 5432
          if [ $? -ne 0 ]; then
            echo "[inventory-service] ERROR: could not reach database host — connection refused" >&2
            exit 1
          fi
          echo "[inventory-service] database ready"
          sleep infinity

        resources:
          requests:
            memory: 32Mi
            cpu: 10m
          limits:
            memory: 128Mi
            cpu: 200m
