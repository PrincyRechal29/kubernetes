apiVersion: apps/v1
kind: Deployment

metadata:
  name: webhook-handler
  namespace: sandbox
  labels:
    app: webhook-handler
    version: v1.0.4
    team: integrations

spec:
  replicas: 1

  selector:
    matchLabels:
      app: webhook-handler

  template:
    metadata:
      labels:
        app: webhook-handler
        version: v1.0.4

    spec:
      containers:
      - name: webhook-handler
        image: busybox:1.36

        command:
        - sh
        - -c
        - |
          /app/bin/webhook-server --port 8080 --config /etc/webhook/config.yaml

        resources:
          requests:
            memory: 32Mi
            cpu: 10m
          limits:
            memory: 128Mi
            cpu: 200m
