apiVersion: apps/v1
kind: Deployment

metadata:
  name: cache-warmer
  namespace: sandbox
  labels:
    app: cache-warmer
    version: v1.1.0
    team: platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cache-warmer

  template:
    metadata:
      labels:
        app: cache-warmer
        version: v1.1.0

    spec:
      containers:
      - name: cache-warmer
        image: busybox:1.36

        command:
        - sh
        - -c
        - |
          echo "[cache-warmer] preloading upstream data into Redis"
          echo "[cache-warmer] warming product catalogue cache"
          sleep infinity

        readinessProbe:
          httpGet:
            path: /ready
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /healthz
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3

        resources:
          requests:
            memory: 32Mi
            cpu: 10m
          limits:
            memory: 128Mi
            cpu: 200m
