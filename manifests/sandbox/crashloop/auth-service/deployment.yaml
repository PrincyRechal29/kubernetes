apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service
  namespace: sandbox
  labels:
    app: auth-service
    version: v1.9.2
    team: platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service
        version: v1.9.2

    spec:
      containers:
      - name: auth-service
        image: busybox:1.36

        command:
        - sh
        - -c
        - |
          echo "[auth-service] initialising..."
          sleep 1
          echo "[auth-service] validating required configuration"
          if [ -z "$DATABASE_URL" ]; then
            echo "[auth-service] FATAL: DATABASE_URL is not set" >&2
            exit 1
          fi
          if [ -z "$JWT_SECRET" ]; then
            echo "[auth-service] FATAL: JWT_SECRET is not set" >&2
            exit 1
          fi
          echo "[auth-service] configuration OK, listening on :8080"
          sleep infinity

        resources:
          requests:
            memory: 32Mi
            cpu: 10m
          limits:
            memory: 128Mi
            cpu: 200m
