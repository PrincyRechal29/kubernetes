apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service
  namespace: sandbox
  labels:
    app: payment-service
    version: v3.4.1
    team: fintech

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service
        version: v3.4.1

    spec:
      containers:
      - name: payment-service
        image: busybox:1.36

        command:
        - sh
        - -c
        - |
          echo "[payment-service] starting up..."
          echo "[payment-service] loading transaction cache into memory"
          echo "[payment-service] processing pending settlement batch"
          tail /dev/zero

        resources:
          requests:
            memory: 16Mi
            cpu: 10m
          limits:
            memory: 32Mi
            cpu: 200m
