apiVersion: apps/v1
kind: Deployment

metadata:
  name: billing-service
  namespace: sandbox
  labels:
    app: billing-service
    version: v6.0.1
    team: fintech

spec:
  replicas: 1

  selector:
    matchLabels:
      app: billing-service

  template:
    metadata:
      labels:
        app: billing-service
        version: v6.0.1

    spec:
      containers:
      - name: billing-service
        image: busybox:1.36

        command:
        - sh
        - -c
        - |
          echo "[billing-service] loading TLS configuration"
          sleep 1
          echo "[billing-service] ERROR: TLS certificate /etc/tls/tls.crt has expired" >&2
          echo "[billing-service] certificate valid until 2024-01-01T00:00:00Z" >&2
          echo "[billing-service] refusing to start with an expired certificate" >&2
          exit 1

        resources:
          requests:
            memory: 32Mi
            cpu: 10m
          limits:
            memory: 128Mi
            cpu: 200m
