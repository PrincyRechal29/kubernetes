apiVersion: apps/v1
kind: Deployment

metadata:
  name: first-webapp
  namespace: first-webapp
  labels:
    app: first-webapp
    version: "1.0.0"
    managed-by: kubectl

spec:
  replicas: 3

  selector:
    matchLabels:
      app: first-webapp

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: first-webapp
        version: "1.0.0"

    spec:
      containers:
      - name: first-webapp
        image: httpd:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80
          name: http
          protocol: TCP

        env:
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: httpd-config
              key: APP_NAME

        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: httpd-config
              key: ENVIRONMENT

        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: httpd-config
              key: LOG_LEVEL

        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: httpd-config
              key: APP_VERSION

        - name: APP_USERNAME
          valueFrom:
            secretKeyRef:
              name: httpd-secret
              key: USERNAME

        - name: APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: httpd-secret
              key: PASSWORD

        volumeMounts:
        - name: html-volume
          mountPath: /usr/local/apache2/htdocs/index.html
          subPath: index.html
        - name: html-volume
          mountPath: /usr/local/apache2/htdocs/princy/index.html
          subPath: princy.html

        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

      volumes:
      - name: html-volume
        configMap:
          name: httpd-config
