apiVersion: v1
kind: ConfigMap
metadata:
  name: test-app-config
  namespace: test-app
data:
  APP_NAME: "httpd-production-webapp"
  ENVIRONMENT: "production"
  LOG_LEVEL: "warn"
  APP_PORT: "80"
  APP_VERSION: "1.0.0"

  princy.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="description" content="Princy Rechal — DevOps & Cloud Engineer portfolio, projects, experience and skills." />
      <title>Princy Rechal &mdash; Portfolio</title>

      <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
          --bg:      #030711;
          --surface: rgba(255,255,255,0.05);
          --border:  rgba(255,255,255,0.1);
          --blue:    #3b82f6;
          --cyan:    #06b6d4;
          --purple:  #8b5cf6;
          --pink:    #ec4899;
          --green:   #10b981;
          --amber:   #f59e0b;
          --red:     #ef4444;
          --text:    #cbd5e1;
          --muted:   #64748b;
          --white:   #f1f5f9;
        }

        html { scroll-behavior: smooth; }

        body {
          background: var(--bg);
          color: var(--white);
          font-family: 'Segoe UI', system-ui, sans-serif;
          overflow-x: hidden;
        }

        /* ── Canvas background ────────────────────────── */
        #bg-canvas {
          position: fixed;
          inset: 0;
          z-index: 0;
          pointer-events: none;
          background:
            radial-gradient(ellipse 700px 400px at 10% 20%, rgba(59,130,246,0.12) 0%, transparent 70%),
            radial-gradient(ellipse 600px 400px at 90% 80%, rgba(139,92,246,0.10) 0%, transparent 70%),
            radial-gradient(ellipse 400px 300px at 60% 40%, rgba(236,72,153,0.07) 0%, transparent 70%);
        }

        /* grid overlay */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          z-index: 0;
          pointer-events: none;
          background-image:
            linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
          background-size: 48px 48px;
        }

        /* ── Layout ───────────────────────────────────── */
        .wrap {
          position: relative;
          z-index: 1;
          width: min(1200px, 92%);
          margin: 0 auto;
        }

        section { padding: 96px 0; }

        .pill {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 6px 16px;
          border-radius: 999px;
          border: 1px solid var(--border);
          background: var(--surface);
          font-size: 12px;
          color: var(--muted);
          letter-spacing: 1px;
          text-transform: uppercase;
          margin-bottom: 20px;
        }

        .pill-dot {
          width: 6px; height: 6px;
          border-radius: 50%;
          background: var(--cyan);
          box-shadow: 0 0 6px var(--cyan);
        }

        .section-heading {
          font-size: clamp(28px, 3.5vw, 46px);
          font-weight: 800;
          line-height: 1.12;
          margin-bottom: 16px;
        }

        .grad { background: linear-gradient(135deg, var(--cyan), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad2 { background: linear-gradient(135deg, var(--pink), var(--amber)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad3 { background: linear-gradient(135deg, var(--green), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .section-sub {
          font-size: 16px;
          color: var(--text);
          line-height: 1.8;
          max-width: 560px;
          margin-bottom: 56px;
        }

        /* ── Navbar ───────────────────────────────────── */
        nav {
          position: sticky;
          top: 0;
          z-index: 200;
          height: 68px;
          background: rgba(3,7,17,0.8);
          backdrop-filter: blur(24px);
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
        }

        .nav-inner {
          width: min(1200px, 92%);
          margin: 0 auto;
          display: flex;
          align-items: center;
          justify-content: space-between;
        }

        .nav-logo {
          font-size: 18px;
          font-weight: 800;
          background: linear-gradient(90deg, var(--cyan), var(--purple));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          text-decoration: none;
        }

        .nav-links { display: flex; gap: 28px; align-items: center; }

        .nav-links a {
          text-decoration: none;
          font-size: 14px;
          color: var(--muted);
          transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--white); }

        .nav-back {
          padding: 7px 18px;
          border-radius: 8px;
          border: 1px solid var(--border);
          font-size: 13px;
          color: var(--white);
          text-decoration: none;
          background: var(--surface);
          transition: border-color 0.2s;
        }

        .nav-back:hover { border-color: var(--cyan); }

        /* ── Hero ─────────────────────────────────────── */
        #hero {
          min-height: calc(100vh - 68px);
          display: flex;
          align-items: center;
          padding: 0;
        }

        .hero-grid {
          display: grid;
          grid-template-columns: 1fr 420px;
          gap: 64px;
          align-items: center;
          width: min(1200px, 92%);
          margin: 0 auto;
        }

        .hero-eyebrow {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 28px;
          flex-wrap: wrap;
        }

        .status-badge {
          display: flex;
          align-items: center;
          gap: 6px;
          padding: 5px 12px;
          border-radius: 999px;
          border: 1px solid rgba(16,185,129,0.3);
          background: rgba(16,185,129,0.08);
          font-size: 12px;
          color: var(--green);
        }

        .status-dot {
          width: 7px; height: 7px;
          border-radius: 50%;
          background: var(--green);
          animation: blink 2s infinite;
        }

        @keyframes blink {
          0%,100% { opacity:1; box-shadow: 0 0 6px var(--green); }
          50%      { opacity:0.4; box-shadow: none; }
        }

        .hero-name {
          font-size: clamp(48px, 6vw, 80px);
          font-weight: 900;
          line-height: 1.02;
          margin-bottom: 12px;
          letter-spacing: -2px;
        }

        .hero-role {
          font-size: clamp(22px, 2.5vw, 32px);
          font-weight: 700;
          margin-bottom: 24px;
          background: linear-gradient(90deg, var(--cyan), var(--purple), var(--pink));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .hero-bio {
          font-size: 17px;
          color: var(--text);
          line-height: 1.85;
          max-width: 560px;
          margin-bottom: 40px;
        }

        .hero-cta { display: flex; gap: 14px; flex-wrap: wrap; }

        .btn {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 13px 26px;
          border-radius: 10px;
          font-size: 14px;
          font-weight: 600;
          text-decoration: none;
          transition: transform 0.2s, box-shadow 0.2s;
          cursor: pointer;
          border: none;
        }

        .btn-cyan {
          background: linear-gradient(135deg, var(--cyan), var(--blue));
          color: white;
          box-shadow: 0 0 20px rgba(6,182,212,0.35);
        }

        .btn-cyan:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(6,182,212,0.55); }

        .btn-outline {
          border: 1px solid var(--border);
          color: var(--white);
          background: var(--surface);
        }

        .btn-outline:hover { border-color: var(--cyan); transform: translateY(-2px); }

        /* Profile card */
        .profile-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 24px;
          padding: 36px;
          backdrop-filter: blur(16px);
          box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        .avatar-ring {
          width: 96px; height: 96px;
          border-radius: 50%;
          background: linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 40px;
          margin: 0 auto 20px;
          box-shadow: 0 0 30px rgba(6,182,212,0.3);
        }

        .profile-name { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 4px; }
        .profile-title { font-size: 13px; color: var(--cyan); text-align: center; margin-bottom: 24px; }

        .profile-stats {
          display: grid;
          grid-template-columns: repeat(3,1fr);
          gap: 1px;
          background: var(--border);
          border-radius: 12px;
          overflow: hidden;
          margin-bottom: 24px;
        }

        .pstat {
          background: var(--bg);
          padding: 16px 8px;
          text-align: center;
        }

        .pstat-num { font-size: 22px; font-weight: 800; color: var(--white); }
        .pstat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

        .profile-links { display: flex; flex-direction: column; gap: 10px; }

        .profile-link {
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 10px 14px;
          border-radius: 10px;
          border: 1px solid var(--border);
          background: rgba(255,255,255,0.03);
          font-size: 13px;
          color: var(--text);
          text-decoration: none;
          transition: border-color 0.2s, color 0.2s;
        }

        .profile-link:hover { border-color: var(--cyan); color: var(--white); }
        .profile-link-icon { font-size: 16px; }

        /* ── Project grid ─────────────────────────────── */
        .projects-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 24px;
        }

        .project-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 18px;
          padding: 28px;
          display: flex;
          flex-direction: column;
          transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
        }

        .project-card:hover {
          transform: translateY(-5px);
          border-color: rgba(6,182,212,0.35);
          box-shadow: 0 16px 48px rgba(6,182,212,0.1);
        }

        .project-card.featured {
          grid-column: span 2;
          flex-direction: row;
          gap: 36px;
          align-items: flex-start;
        }

        .project-header {
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          margin-bottom: 14px;
        }

        .project-icon {
          width: 48px; height: 48px;
          border-radius: 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 22px;
          flex-shrink: 0;
        }

        .ic-blue   { background: rgba(59,130,246,0.15);  }
        .ic-purple { background: rgba(139,92,246,0.15);  }
        .ic-green  { background: rgba(16,185,129,0.15);  }
        .ic-amber  { background: rgba(245,158,11,0.15);  }
        .ic-pink   { background: rgba(236,72,153,0.15);  }
        .ic-red    { background: rgba(239,68,68,0.15);   }
        .ic-cyan   { background: rgba(6,182,212,0.15);   }

        .project-status {
          padding: 4px 10px;
          border-radius: 6px;
          font-size: 11px;
          font-weight: 600;
        }

        .status-live { background: rgba(16,185,129,0.15); color: var(--green); }
        .status-wip  { background: rgba(245,158,11,0.15); color: var(--amber); }
        .status-done { background: rgba(59,130,246,0.15); color: var(--blue);  }

        .project-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .project-desc  { font-size: 14px; color: var(--text); line-height: 1.75; flex: 1; }

        .project-tags {
          display: flex;
          flex-wrap: wrap;
          gap: 6px;
          margin-top: 18px;
        }

        .tag {
          padding: 4px 10px;
          border-radius: 6px;
          font-size: 11px;
          background: rgba(255,255,255,0.06);
          border: 1px solid var(--border);
          color: var(--muted);
        }

        .project-meta {
          display: flex;
          gap: 16px;
          margin-top: 16px;
          padding-top: 16px;
          border-top: 1px solid var(--border);
          font-size: 12px;
          color: var(--muted);
        }

        .project-meta span { display: flex; align-items: center; gap: 5px; }

        /* Featured extras */
        .featured-left { flex: 1; }
        .featured-right { width: 260px; flex-shrink: 0; }

        .featured-stat-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }

        .fstat {
          background: rgba(255,255,255,0.04);
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 16px;
          text-align: center;
        }

        .fstat-val { font-size: 20px; font-weight: 800; color: var(--cyan); }
        .fstat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

        /* ── Timeline ─────────────────────────────────── */
        #experience { background: rgba(255,255,255,0.015); }

        .timeline { position: relative; padding-left: 36px; }

        .timeline::before {
          content: '';
          position: absolute;
          left: 0;
          top: 8px;
          bottom: 8px;
          width: 2px;
          background: linear-gradient(to bottom, var(--cyan), var(--purple), var(--pink));
          border-radius: 2px;
        }

        .tl-item {
          position: relative;
          margin-bottom: 48px;
        }

        .tl-item:last-child { margin-bottom: 0; }

        .tl-dot {
          position: absolute;
          left: -43px;
          top: 4px;
          width: 14px; height: 14px;
          border-radius: 50%;
          background: var(--bg);
          border: 2px solid var(--cyan);
          box-shadow: 0 0 12px rgba(6,182,212,0.4);
        }

        .tl-dot.purple { border-color: var(--purple); box-shadow: 0 0 12px rgba(139,92,246,0.4); }
        .tl-dot.pink   { border-color: var(--pink);   box-shadow: 0 0 12px rgba(236,72,153,0.4); }

        .tl-period {
          font-size: 12px;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: 1px;
          margin-bottom: 8px;
        }

        .tl-role { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .tl-company { font-size: 14px; color: var(--cyan); margin-bottom: 14px; }

        .tl-body {
          font-size: 14px;
          color: var(--text);
          line-height: 1.8;
          margin-bottom: 16px;
        }

        .tl-bullets { list-style: none; }

        .tl-bullets li {
          position: relative;
          padding-left: 18px;
          font-size: 14px;
          color: var(--text);
          line-height: 1.7;
          margin-bottom: 6px;
        }

        .tl-bullets li::before {
          content: '▸';
          position: absolute;
          left: 0;
          color: var(--cyan);
          font-size: 12px;
          top: 3px;
        }

        /* ── Skills ───────────────────────────────────── */
        .skills-outer {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 28px;
        }

        .skill-group {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 18px;
          padding: 28px;
        }

        .skill-group-title {
          font-size: 13px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1px;
          color: var(--muted);
          margin-bottom: 20px;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .skill-list { list-style: none; }

        .skill-item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 14px;
        }

        .skill-item:last-child { margin-bottom: 0; }

        .skill-name { font-size: 14px; color: var(--text); }

        .skill-bar-wrap {
          width: 120px;
          height: 6px;
          background: rgba(255,255,255,0.08);
          border-radius: 6px;
          overflow: hidden;
        }

        .skill-bar { height: 100%; border-radius: 6px; }
        .bar-cyan   { background: linear-gradient(90deg, var(--cyan), var(--blue)); }
        .bar-purple { background: linear-gradient(90deg, var(--purple), var(--pink)); }
        .bar-green  { background: linear-gradient(90deg, var(--green), var(--cyan)); }

        /* ── Certifications ───────────────────────────── */
        #certs { background: rgba(255,255,255,0.015); }

        .certs-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 20px;
        }

        .cert-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 16px;
          padding: 24px;
          transition: transform 0.2s, border-color 0.2s;
        }

        .cert-card:hover { transform: translateY(-4px); border-color: rgba(139,92,246,0.4); }

        .cert-issuer { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .cert-name   { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .cert-date   { font-size: 12px; color: var(--purple); }

        .cert-badge {
          width: 40px; height: 40px;
          border-radius: 10px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 20px;
          margin-bottom: 16px;
        }

        /* ── OSS / Blog ───────────────────────────────── */
        .oss-list { display: flex; flex-direction: column; gap: 16px; }

        .oss-item {
          display: flex;
          align-items: flex-start;
          gap: 20px;
          padding: 22px;
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 14px;
          transition: border-color 0.2s;
        }

        .oss-item:hover { border-color: rgba(6,182,212,0.35); }

        .oss-icon { font-size: 28px; flex-shrink: 0; }
        .oss-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .oss-desc  { font-size: 13px; color: var(--text); line-height: 1.7; }
        .oss-meta  { display: flex; gap: 14px; margin-top: 10px; font-size: 12px; color: var(--muted); }

        /* ── Blog / Articles ──────────────────────────── */
        .articles-grid {
          display: grid;
          grid-template-columns: repeat(3,1fr);
          gap: 20px;
        }

        .article-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 14px;
          padding: 24px;
          transition: transform 0.2s, border-color 0.2s;
        }

        .article-card:hover { transform: translateY(-4px); border-color: rgba(236,72,153,0.35); }

        .article-tag { font-size: 11px; color: var(--pink); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .article-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
        .article-desc { font-size: 13px; color: var(--text); line-height: 1.7; }
        .article-footer { display: flex; justify-content: space-between; margin-top: 16px; font-size: 12px; color: var(--muted); }

        /* ── Contact ──────────────────────────────────── */
        .contact-box {
          background: linear-gradient(135deg, rgba(6,182,212,0.08), rgba(139,92,246,0.08));
          border: 1px solid rgba(139,92,246,0.25);
          border-radius: 28px;
          padding: 72px;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 72px;
          align-items: center;
        }

        .contact-heading { font-size: clamp(28px, 3vw, 44px); font-weight: 800; line-height: 1.1; margin-bottom: 16px; }
        .contact-sub { font-size: 15px; color: var(--text); line-height: 1.8; margin-bottom: 32px; }

        .contact-list { list-style: none; }

        .contact-list li {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 14px 0;
          border-bottom: 1px solid var(--border);
          font-size: 14px;
          color: var(--text);
        }

        .contact-list li:last-child { border-bottom: none; }
        .contact-list li span:first-child { font-size: 20px; }

        .contact-right { display: flex; flex-direction: column; gap: 14px; }

        .contact-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 14px;
          padding: 20px 24px;
          display: flex;
          align-items: center;
          gap: 16px;
          text-decoration: none;
          transition: border-color 0.2s, transform 0.2s;
        }

        .contact-card:hover { border-color: var(--cyan); transform: translateX(4px); }
        .contact-card-icon { font-size: 24px; }
        .contact-card-title { font-size: 14px; font-weight: 600; color: var(--white); }
        .contact-card-sub   { font-size: 12px; color: var(--muted); }
        .contact-card-arrow { margin-left: auto; color: var(--muted); }

        /* ── Footer ───────────────────────────────────── */
        footer {
          position: relative;
          z-index: 1;
          border-top: 1px solid var(--border);
          padding: 40px 0;
        }

        .footer-inner {
          width: min(1200px, 92%);
          margin: 0 auto;
          display: flex;
          align-items: center;
          justify-content: space-between;
          flex-wrap: wrap;
          gap: 16px;
          font-size: 13px;
          color: var(--muted);
        }

        .footer-inner a { color: var(--cyan); text-decoration: none; }
        .footer-inner a:hover { text-decoration: underline; }

        /* ── Responsive ───────────────────────────────── */
        @media (max-width: 1024px) {
          .hero-grid     { grid-template-columns: 1fr; }
          .projects-grid { grid-template-columns: 1fr; }
          .project-card.featured { grid-column: 1; flex-direction: column; }
          .featured-right { width: 100%; }
          .skills-outer  { grid-template-columns: 1fr 1fr; }
          .certs-grid    { grid-template-columns: 1fr 1fr; }
          .articles-grid { grid-template-columns: 1fr 1fr; }
          .contact-box   { grid-template-columns: 1fr; padding: 48px 32px; gap: 40px; }
        }

        @media (max-width: 640px) {
          nav .nav-links { display: none; }
          .skills-outer  { grid-template-columns: 1fr; }
          .certs-grid    { grid-template-columns: 1fr; }
          .articles-grid { grid-template-columns: 1fr; }
        }
      </style>
    </head>

    <body>
      <div id="bg-canvas"></div>

      <!-- ── Navbar ─────────────────────────────────────── -->
