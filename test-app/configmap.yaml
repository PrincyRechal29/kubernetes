    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="description" content="Production-grade Kubernetes platform — Apache HTTPD deployment by Princy Rechal" />
      <title>PRINCY.dev &mdash; Production Platform</title>

      <style>
        *, *::before, *::after {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        :root {
          --blue:    #00d4ff;
          --purple:  #6c63ff;
          --pink:    #ff4ecd;
          --green:   #00ff88;
          --dark:    #050816;
          --card-bg: rgba(255,255,255,0.06);
          --border:  rgba(255,255,255,0.12);
          --text:    #d9e3ff;
          --muted:   #8ea0d8;
        }

        html { scroll-behavior: smooth; }

        body {
          background: var(--dark);
          color: white;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          overflow-x: hidden;
        }

        /* ── Animated background ────────────────────────── */
        .bg-orbs {
          position: fixed;
          inset: 0;
          z-index: 0;
          pointer-events: none;
          overflow: hidden;
        }

        .orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(100px);
          opacity: 0.35;
          animation: drift linear infinite alternate;
        }

        .orb-1 { width:420px; height:420px; background:var(--purple); top:-100px; left:-100px; animation-duration:18s; }
        .orb-2 { width:500px; height:500px; background:var(--blue);   bottom:-150px; right:-100px; animation-duration:22s; }
        .orb-3 { width:300px; height:300px; background:var(--pink);   top:45%; left:50%; animation-duration:14s; }
        .orb-4 { width:250px; height:250px; background:var(--green);  top:20%; right:15%; animation-duration:16s; opacity:0.2; }

        @keyframes drift {
          from { transform: translate(0, 0) scale(1);   }
          to   { transform: translate(50px, -60px) scale(1.1); }
        }

        /* ── Layout helpers ─────────────────────────────── */
        .container {
          position: relative;
          z-index: 1;
          width: min(1280px, 92%);
          margin: 0 auto;
        }

        section { padding: 100px 0; }

        .section-label {
          display: inline-block;
          padding: 8px 18px;
          border-radius: 30px;
          background: rgba(0,212,255,0.12);
          color: var(--blue);
          border: 1px solid rgba(0,212,255,0.3);
          font-size: 13px;
          letter-spacing: 1px;
          text-transform: uppercase;
          margin-bottom: 20px;
        }

        .section-title {
          font-size: clamp(32px, 4vw, 52px);
          line-height: 1.15;
          margin-bottom: 18px;
        }

        .section-title span {
          background: linear-gradient(90deg, var(--blue), var(--pink));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .section-sub {
          font-size: 17px;
          color: var(--text);
          line-height: 1.8;
          max-width: 620px;
        }

        /* ── Navbar ─────────────────────────────────────── */
        nav {
          position: sticky;
          top: 0;
          z-index: 100;
          padding: 0 8%;
          height: 72px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          background: rgba(5,8,22,0.75);
          backdrop-filter: blur(20px);
          border-bottom: 1px solid var(--border);
        }

        .logo {
          font-size: 24px;
          font-weight: 800;
          color: var(--blue);
          letter-spacing: 2px;
        }

        .logo span { color: var(--pink); }

        .nav-links { display: flex; gap: 32px; }

        .nav-links a {
          text-decoration: none;
          color: var(--muted);
          font-size: 15px;
          transition: color 0.25s;
        }

        .nav-links a:hover { color: var(--blue); }

        .nav-badge {
          padding: 6px 14px;
          border-radius: 8px;
          background: linear-gradient(90deg, var(--blue), var(--purple));
          color: white;
          font-size: 13px;
          font-weight: 600;
          text-decoration: none;
        }

        /* ── Hero ───────────────────────────────────────── */
        #hero {
          min-height: calc(100vh - 72px);
          display: flex;
          align-items: center;
          padding: 0;
        }

        .hero-inner {
          position: relative;
          z-index: 1;
          width: min(1280px, 92%);
          margin: 0 auto;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 60px;
          align-items: center;
        }

        .hero-eyebrow {
          display: flex;
          align-items: center;
          gap: 10px;
          margin-bottom: 24px;
        }

        .live-dot {
          width: 10px; height: 10px;
          border-radius: 50%;
          background: var(--green);
          box-shadow: 0 0 10px var(--green);
          animation: pulse 2s infinite;
        }

        @keyframes pulse {
          0%,100% { box-shadow: 0 0 10px var(--green); }
          50%      { box-shadow: 0 0 20px var(--green), 0 0 40px var(--green); }
        }

        .live-text { font-size: 13px; color: var(--green); letter-spacing: 1px; }

        .hero-title {
          font-size: clamp(40px, 5vw, 72px);
          line-height: 1.08;
          margin-bottom: 28px;
          font-weight: 800;
        }

        .hero-title span {
          background: linear-gradient(135deg, var(--blue), var(--purple), var(--pink));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .hero-desc {
          font-size: 18px;
          line-height: 1.85;
          color: var(--text);
          margin-bottom: 40px;
        }

        .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }

        .btn {
          padding: 14px 30px;
          border-radius: 12px;
          font-size: 15px;
          font-weight: 600;
          text-decoration: none;
          transition: transform 0.25s, box-shadow 0.25s;
          display: inline-block;
        }

        .btn-primary {
          background: linear-gradient(90deg, var(--blue), var(--purple));
          color: white;
          box-shadow: 0 0 24px rgba(0,212,255,0.45);
        }

        .btn-primary:hover {
          transform: translateY(-3px);
          box-shadow: 0 0 40px rgba(0,212,255,0.7);
        }

        .btn-ghost {
          border: 1px solid var(--border);
          color: white;
          background: var(--card-bg);
        }

        .btn-ghost:hover {
          background: rgba(255,255,255,0.1);
          transform: translateY(-2px);
        }

        /* Hero status card */
        .hero-panel {
          background: var(--card-bg);
          border: 1px solid var(--border);
          backdrop-filter: blur(20px);
          border-radius: 28px;
          padding: 36px;
          box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .panel-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 28px;
        }

        .panel-title { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

        .status-chip {
          display: flex;
          align-items: center;
          gap: 6px;
          padding: 5px 12px;
          border-radius: 20px;
          background: rgba(0,255,136,0.12);
          border: 1px solid rgba(0,255,136,0.3);
          font-size: 12px;
          color: var(--green);
        }

        .metric-row {
          margin-bottom: 22px;
        }

        .metric-row-header {
          display: flex;
          justify-content: space-between;
          margin-bottom: 9px;
          font-size: 14px;
          color: var(--muted);
        }

        .metric-row-header strong { color: white; }

        .bar-track {
          width: 100%;
          height: 8px;
          border-radius: 10px;
          background: rgba(255,255,255,0.08);
          overflow: hidden;
        }

        .bar-fill {
          height: 100%;
          border-radius: 10px;
          background: linear-gradient(90deg, var(--blue), var(--purple));
          position: relative;
        }

        .bar-fill::after {
          content: '';
          position: absolute;
          right: 0; top: 0;
          width: 12px; height: 100%;
          background: white;
          border-radius: 10px;
          box-shadow: 0 0 10px var(--blue);
          opacity: 0.8;
        }

        .panel-divider {
          height: 1px;
          background: var(--border);
          margin: 24px 0;
        }

        .pod-grid {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 8px;
        }

        .pod-chip {
          padding: 8px;
          border-radius: 10px;
          background: rgba(0,255,136,0.08);
          border: 1px solid rgba(0,255,136,0.2);
          text-align: center;
          font-size: 11px;
          color: var(--green);
        }

        .pod-chip.warn {
          background: rgba(255,200,0,0.08);
          border-color: rgba(255,200,0,0.25);
          color: #ffc800;
        }

        /* ── Stats bar ──────────────────────────────────── */
        .stats-bar {
          position: relative;
          z-index: 1;
          background: rgba(255,255,255,0.04);
          border-top: 1px solid var(--border);
          border-bottom: 1px solid var(--border);
          padding: 40px 0;
        }

        .stats-grid {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 0;
        }

        .stat-item {
          text-align: center;
          padding: 20px;
          border-right: 1px solid var(--border);
        }

        .stat-item:last-child { border-right: none; }

        .stat-number {
          font-size: 42px;
          font-weight: 800;
          background: linear-gradient(90deg, var(--blue), var(--pink));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          line-height: 1;
          margin-bottom: 8px;
        }

        .stat-label { font-size: 14px; color: var(--muted); }

        /* ── Features grid ──────────────────────────────── */
        .features-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 24px;
          margin-top: 60px;
        }

        .feature-card {
          background: var(--card-bg);
          border: 1px solid var(--border);
          border-radius: 20px;
          padding: 32px;
          transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .feature-card:hover {
          transform: translateY(-6px);
          border-color: rgba(0,212,255,0.35);
          box-shadow: 0 12px 40px rgba(0,212,255,0.12);
        }

        .feature-icon {
          width: 52px; height: 52px;
          border-radius: 14px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 24px;
          margin-bottom: 20px;
        }

        .icon-blue   { background: rgba(0,212,255,0.15);  }
        .icon-purple { background: rgba(108,99,255,0.15); }
        .icon-pink   { background: rgba(255,78,205,0.15); }
        .icon-green  { background: rgba(0,255,136,0.15);  }
        .icon-orange { background: rgba(255,165,0,0.15);  }
        .icon-red    { background: rgba(255,80,80,0.15);  }

        .feature-title {
          font-size: 19px;
          font-weight: 700;
          margin-bottom: 12px;
        }

        .feature-desc {
          font-size: 14px;
          color: var(--text);
          line-height: 1.75;
        }

        .feature-tags {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin-top: 18px;
        }

        .tag-chip {
          padding: 4px 10px;
          border-radius: 6px;
          font-size: 11px;
          background: rgba(255,255,255,0.08);
          color: var(--muted);
          border: 1px solid var(--border);
        }

        /* ── Architecture diagram ───────────────────────── */
        #architecture { background: rgba(255,255,255,0.015); }

        .arch-flow {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 0;
          margin-top: 60px;
          flex-wrap: wrap;
        }

        .arch-node {
          text-align: center;
          padding: 28px 24px;
          border-radius: 18px;
          background: var(--card-bg);
          border: 1px solid var(--border);
          min-width: 140px;
          transition: border-color 0.3s;
        }

        .arch-node:hover { border-color: rgba(0,212,255,0.4); }

        .arch-node-icon { font-size: 32px; margin-bottom: 12px; }
        .arch-node-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .arch-node-sub  { font-size: 11px; color: var(--muted); }

        .arch-arrow {
          font-size: 22px;
          color: var(--blue);
          margin: 0 12px;
          opacity: 0.6;
        }

        /* ── Tech stack ─────────────────────────────────── */
        .tech-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          gap: 16px;
          margin-top: 52px;
        }

        .tech-badge {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 16px 20px;
          border-radius: 14px;
          background: var(--card-bg);
          border: 1px solid var(--border);
          transition: border-color 0.25s, transform 0.25s;
        }

        .tech-badge:hover {
          border-color: rgba(108,99,255,0.4);
          transform: translateY(-3px);
        }

        .tech-logo { font-size: 28px; }

        .tech-info-name  { font-size: 14px; font-weight: 600; }
        .tech-info-label { font-size: 11px; color: var(--muted); }

        /* ── Observability ──────────────────────────────── */
        .obs-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 28px;
          margin-top: 60px;
        }

        .obs-card {
          background: var(--card-bg);
          border: 1px solid var(--border);
          border-radius: 20px;
          padding: 32px;
        }

        .obs-card-title {
          font-size: 16px;
          font-weight: 700;
          margin-bottom: 20px;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .obs-metric-list { list-style: none; }

        .obs-metric-list li {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 12px 0;
          border-bottom: 1px solid var(--border);
          font-size: 14px;
        }

        .obs-metric-list li:last-child { border-bottom: none; }

        .obs-metric-list li span:first-child { color: var(--muted); }

        .obs-value { font-weight: 600; }
        .obs-value.good  { color: var(--green); }
        .obs-value.warn  { color: #ffc800; }
        .obs-value.blue  { color: var(--blue); }

        /* Log terminal */
        .log-terminal {
          background: #0a0e1f;
          border: 1px solid rgba(0,212,255,0.2);
          border-radius: 14px;
          padding: 20px;
          font-family: 'Courier New', monospace;
          font-size: 12px;
          line-height: 1.9;
          max-height: 240px;
          overflow: hidden;
        }

        .log-line { display: block; }
        .log-time  { color: var(--muted); margin-right: 10px; }
        .log-level-info  { color: var(--blue); }
        .log-level-ok    { color: var(--green); }
        .log-level-warn  { color: #ffc800; }
        .log-msg { color: #c8d8ff; }

        /* ── Team / About ────────────────────────────────── */
        #about { background: rgba(255,255,255,0.015); }

        .about-inner {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 80px;
          align-items: center;
        }

        .about-checklist { list-style: none; margin-top: 28px; }

        .about-checklist li {
          display: flex;
          align-items: flex-start;
          gap: 14px;
          padding: 14px 0;
          border-bottom: 1px solid var(--border);
          font-size: 15px;
          color: var(--text);
          line-height: 1.6;
        }

        .about-checklist li:last-child { border-bottom: none; }

        .check-icon {
          flex-shrink: 0;
          width: 22px; height: 22px;
          border-radius: 50%;
          background: rgba(0,255,136,0.15);
          border: 1px solid rgba(0,255,136,0.3);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 12px;
          margin-top: 2px;
        }

        .about-card {
          background: var(--card-bg);
          border: 1px solid var(--border);
          border-radius: 24px;
          padding: 40px;
        }

        .about-avatar {
          width: 80px; height: 80px;
          border-radius: 50%;
          background: linear-gradient(135deg, var(--blue), var(--purple));
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 32px;
          margin-bottom: 20px;
        }

        .about-name { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
        .about-role { font-size: 14px; color: var(--blue); margin-bottom: 18px; }
        .about-bio  { font-size: 14px; color: var(--text); line-height: 1.8; }

        .skill-tags {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin-top: 22px;
        }

        .skill-tag {
          padding: 6px 14px;
          border-radius: 8px;
          font-size: 12px;
          background: rgba(108,99,255,0.15);
          border: 1px solid rgba(108,99,255,0.3);
          color: #a89fff;
        }

        /* ── CTA ────────────────────────────────────────── */
        .cta-box {
          background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(0,212,255,0.15));
          border: 1px solid rgba(108,99,255,0.3);
          border-radius: 28px;
          padding: 72px 60px;
          text-align: center;
        }

        .cta-box .section-title { font-size: clamp(28px, 3.5vw, 48px); }
        .cta-box .section-sub   { margin: 0 auto 40px; }
        .cta-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

        /* ── Footer ─────────────────────────────────────── */
        footer {
          position: relative;
          z-index: 1;
          background: rgba(255,255,255,0.03);
          border-top: 1px solid var(--border);
          padding: 60px 0 32px;
        }

        .footer-grid {
          display: grid;
          grid-template-columns: 2fr 1fr 1fr 1fr;
          gap: 48px;
          margin-bottom: 48px;
        }

        .footer-brand .logo { font-size: 22px; margin-bottom: 14px; display: block; }

        .footer-brand p {
          font-size: 14px;
          color: var(--muted);
          line-height: 1.75;
          max-width: 280px;
        }

        .footer-col-title {
          font-size: 13px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1px;
          color: white;
          margin-bottom: 18px;
        }

        .footer-links { list-style: none; }

        .footer-links li { margin-bottom: 10px; }

        .footer-links a {
          text-decoration: none;
          color: var(--muted);
          font-size: 14px;
          transition: color 0.25s;
        }

        .footer-links a:hover { color: var(--blue); }

        .footer-bottom {
          border-top: 1px solid var(--border);
          padding-top: 28px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-size: 13px;
          color: var(--muted);
          flex-wrap: wrap;
          gap: 12px;
        }

        .footer-bottom-right { display: flex; gap: 20px; }

        /* ── Responsive ─────────────────────────────────── */
        @media (max-width: 1024px) {
          .hero-inner    { grid-template-columns: 1fr; }
          .features-grid { grid-template-columns: repeat(2, 1fr); }
          .stats-grid    { grid-template-columns: repeat(2, 1fr); }
          .obs-grid      { grid-template-columns: 1fr; }
          .about-inner   { grid-template-columns: 1fr; }
          .footer-grid   { grid-template-columns: 1fr 1fr; }
          .arch-flow     { gap: 12px; }
          .arch-arrow    { display: none; }
        }

        @media (max-width: 640px) {
          nav { padding: 0 5%; }
          .nav-links { display: none; }
          .features-grid { grid-template-columns: 1fr; }
          .stats-grid    { grid-template-columns: 1fr 1fr; }
          .footer-grid   { grid-template-columns: 1fr; }
          .cta-box       { padding: 48px 24px; }
        }
      </style>
    </head>

    <body>

      <!-- Animated background orbs -->
      <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
      </div>

      <!-- ── Navbar ──────────────────────────────────────── -->
      <nav>
        <div class="logo">PRINCY<span>.dev</span></div>
        <div class="nav-links">
          <a href="#features">Features</a>
          <a href="#architecture">Architecture</a>
          <a href="#stack">Tech Stack</a>
          <a href="#observability">Observability</a>
          <a href="#about">About</a>
        </div>
        <a href="#contact" class="nav-badge">Get in Touch</a>
