      <!-- ── Hero ───────────────────────────────────────── -->
      <section id="hero">
        <div class="hero-inner">

          <div class="hero-left">
            <div class="hero-eyebrow">
              <div class="live-dot"></div>
              <span class="live-text">PRODUCTION &bull; APACHE HTTPD &bull; KUBERNETES</span>
            </div>
            <h1 class="hero-title">
              Cloud-Native<br />
              <span>Production Platform</span><br />
              on Kubernetes
            </h1>
            <p class="hero-desc">
              A fully production-grade web application deployed with Apache HTTPD on
              Kubernetes — featuring zero-downtime rollouts, auto-scaling, secret
              management, and GitOps-ready manifests. Built for reliability at scale.
            </p>
            <div class="hero-actions">
