      <!-- ── Features ───────────────────────────────────── -->
      <section id="features">
        <div class="container">
          <div class="section-label">Platform Capabilities</div>
          <h2 class="section-title">Everything You Need for <span>Production</span></h2>
          <p class="section-sub">
            This deployment demonstrates enterprise patterns for running stateless web
            applications reliably in Kubernetes at any scale.
          </p>

          <div class="features-grid">

            <div class="feature-card">
              <div class="feature-icon icon-blue">&#x1F4E6;</div>
              <div class="feature-title">Zero-Downtime Deployments</div>
              <div class="feature-desc">
                Rolling update strategy ensures new pods are ready before old ones are
                terminated. Max surge and max unavailable are tuned for continuous availability.
              </div>
              <div class="feature-tags">
                <span class="tag-chip">RollingUpdate</span>
                <span class="tag-chip">maxSurge: 1</span>
                <span class="tag-chip">maxUnavailable: 0</span>
              </div>
            </div>

            <div class="feature-card">
              <div class="feature-icon icon-purple">&#x1F511;</div>
              <div class="feature-title">Secret Management</div>
              <div class="feature-desc">
                Sensitive credentials are stored as Kubernetes Secrets and injected as
                environment variables at runtime — never baked into the container image.
              </div>
              <div class="feature-tags">
                <span class="tag-chip">Opaque Secrets</span>
                <span class="tag-chip">RBAC</span>
                <span class="tag-chip">Env Injection</span>
              </div>
            </div>

            <div class="feature-card">
              <div class="feature-icon icon-green">&#x2764;&#xFE0F;</div>
              <div class="feature-title">Health Probes</div>
              <div class="feature-desc">
                Liveness and readiness probes guarantee only healthy pods receive traffic.
                Failed pods are automatically restarted by the kubelet without manual
                intervention.
              </div>
              <div class="feature-tags">
                <span class="tag-chip">livenessProbe</span>
                <span class="tag-chip">readinessProbe</span>
                <span class="tag-chip">httpGet</span>
              </div>
            </div>

            <div class="feature-card">
              <div class="feature-icon icon-orange">&#x1F4CF;</div>
              <div class="feature-title">Resource Governance</div>
              <div class="feature-desc">
                CPU and memory requests and limits prevent noisy-neighbour problems and
                enable the scheduler to pack workloads efficiently across nodes.
              </div>
              <div class="feature-tags">
                <span class="tag-chip">requests</span>
                <span class="tag-chip">limits</span>
                <span class="tag-chip">QoS: Burstable</span>
              </div>
            </div>

            <div class="feature-card">
              <div class="feature-icon icon-pink">&#x1F4C4;</div>
              <div class="feature-title">ConfigMap Injection</div>
              <div class="feature-desc">
                HTML content and application configuration live in a ConfigMap, mounted as
                a volume. Update content without rebuilding the image — just roll the pods.
              </div>
              <div class="feature-tags">
                <span class="tag-chip">ConfigMap</span>
                <span class="tag-chip">volumeMount</span>
                <span class="tag-chip">subPath</span>
              </div>
            </div>

            <div class="feature-card">
              <div class="feature-icon icon-red">&#x1F6E1;&#xFE0F;</div>
              <div class="feature-title">Network Isolation</div>
              <div class="feature-desc">
                Each component runs in a dedicated namespace with a ClusterIP Service for
                internal routing and a LoadBalancer for controlled external ingress.
              </div>
              <div class="feature-tags">
                <span class="tag-chip">Namespace</span>
                <span class="tag-chip">ClusterIP</span>
                <span class="tag-chip">LoadBalancer</span>
              </div>
            </div>

          </div>
        </div>
      </section>

